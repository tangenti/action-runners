name: build-attest

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-and-attest:
    runs-on: self-hosted

    permissions:
      id-token: write      # mint GitHub OIDC token → Sigstore Fulcio cert
      attestations: write  # upload attestation to GitHub API
      contents: read

    env:
      # The runner is the official actions/runner binary running natively on
      # your Mac, so it reaches the local registry on localhost:5001 directly.
      REGISTRY: localhost:5001
      IMAGE_NAME: hello-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the host's Docker socket that the runner container mounts.
          driver: docker

      - name: Build and push image to local registry
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Tag with the short SHA so every commit produces a unique image.
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Plain docker driver writes the digest to stdout; capture it below.

      # docker/build-push-action sets steps.push.outputs.digest = sha256:...
      # when driver=docker and push=true. Verify it is populated.
      - name: Verify digest
        run: |
          echo "Digest: ${{ steps.push.outputs.digest }}"
          if [ -z "${{ steps.push.outputs.digest }}" ]; then
            echo "ERROR: digest is empty" >&2
            exit 1
          fi

      # actions/attest-build-provenance reads ~/.docker/config.json to find the
      # auth header for the target registry. Our local registry is anonymous,
      # but the action throws "No credentials found" if no auths entry exists.
      # Writing dummy credentials satisfies the lookup; the registry ignores them.
      - name: Add dummy credentials for local registry
        run: |
          mkdir -p ~/.docker
          if [ -f ~/.docker/config.json ]; then
            jq '.auths["${{ env.REGISTRY }}"] = {"auth": "ZHVtbXk6ZHVtbXk="}' \
              ~/.docker/config.json > /tmp/docker-config.json
            mv /tmp/docker-config.json ~/.docker/config.json
          else
            echo '{"auths":{"${{ env.REGISTRY }}":{"auth":"ZHVtbXk6ZHVtbXk="}}}' \
              > ~/.docker/config.json
          fi

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Print attestation outputs
        run: |
          echo "Attestation ID  : ${{ steps.attest.outputs.attestation-id }}"
          echo "Attestation URL : ${{ steps.attest.outputs.attestation-url }}"
          echo "Bundle path     : ${{ steps.attest.outputs.bundle-path }}"
          echo ""
          echo "── Bundle contents (truncated) ──────────────────────────────────"
          cat "${{ steps.attest.outputs.bundle-path }}" | python3 -m json.tool --indent 2 | head -60
